<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Каталог инструментов</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
<div class="admin-shell">
  <header class="admin-header">
    <h1 class="admin-title">Admin — Каталог инструментов</h1>
    <a class="admin-subtle-link" href="orders.html">Заказы</a>
  </header>

  <div class="admin-grid">
    <div class="admin-col">
      <section class="admin-card">
        <h2 class="card-title">1. Метаданные артикула</h2>

        <div class="form-grid">
          <label>
            Артикул
            <input id="article" />
          </label>

          <label>
            Наименование
            <input id="name" />
          </label>

          <label>
            Бренд
            <input id="brand" />
          </label>

          <label>
            Маркировка (optional)
            <input id="defaultLabel" placeholder="e.g. 10" />
          </label>

          <label>
            Категория
            <select id="categorySelect"></select>
          </label>

          <div class="admin-card subpanel">
            <label>
              Транслит (slug) новой категории
              <input id="newCategorySlug" placeholder="new-category-slug" />
            </label>

            <label>
              Название новой категории
              <input id="newCategoryLabel" placeholder="Label на русском" />
            </label>

            <button id="createCategoryBtn" class="button-secondary" type="button">Создать категорию</button>
          </div>

          <label>
            Дополнительное маштабирование (для проблемных svg)
            <input id="scaleOverride" type="number" step="0.01" value="1.0" />
          </label>

          <label>
            Длина прохода фрезы (в метрах)
            <input id="cuttingLengthMeters" type="number" step="0.01" value="0" />
          </label>

          <label class="checkbox-row">
            <input id="enabled" type="checkbox" checked />
            Enabled
          </label>

          <button id="createItemBtn" class="button-primary">
            Создать / обновить артикул
          </button>
        </div>
      </section>

      <section class="admin-card">
        <h2 class="card-title">2. Загрузка файлов для существующего id</h2>

        <div class="form-grid">
          <label>
            ID артикула
            <input id="itemId" disabled />
          </label>

          <label>
            SVG
            <input id="svg" type="file" accept=".svg" />
          </label>
          <label>
            DXF (для конверсии в SVG)
            <input id="dxf" type="file" accept=".dxf" />
          </label>

          <button id="uploadDxfBtn" class="button-secondary" disabled>
            Конвертировать DXF в SVG
          </button>

          <label>
            NC (gcode)
            <input id="nc" type="file" accept=".nc" />
          </label>

          <label>
            Фото превью
            <input id="preview" type="file" accept="image/*" />
          </label>

          <label class="checkbox-row">
            <input id="force" type="checkbox" />
            Разрешить перезапись файлов
          </label>

          <button id="uploadFilesBtn" class="button-primary" disabled>
            Загрузить файлы
          </button>
        </div>
      </section>
    </div>

    <div class="admin-col">
      <section class="admin-card">
        <h2 class="card-title">3. Список артикулов</h2>
        <p id="itemsStatus" class="muted">Загрузка списка…</p>
        <div id="itemsList" class="items-list"></div>
      </section>
    </div>
  </div>

  <p id="status" class="status-line"></p>
  <pre id="result"></pre>
</div>

<script src="admin.js"></script>
</body>
</html>
