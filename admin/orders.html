<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель управления заказами</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header">
      <h1 class="admin-title">Admin — Заказы</h1>
      <div class="toolbar">
        <a class="admin-subtle-link" href="./">← Каталог инструментов</a>
      </div>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Список заказов</h2>
        <button id="reloadBtn" class="button-secondary" type="button">Обновить</button>
        <p id="listStatus" class="muted">Загрузка…</p>
        <div id="ordersList" class="orders-list"></div>
      </section>

      <section class="panel">
        <h2>Детали заказа</h2>
        <div id="detailsEmpty" class="muted">Выберите заказ в списке слева.</div>
        <div id="details" hidden>
          <div id="orderMeta" class="order-meta-grid"></div>

          <div class="actions">
            <button id="confirmBtn" class="button-primary" type="button">Подтвердить</button>
            <button id="producedBtn" class="button-danger" type="button">Произведен</button>
            <a id="downloadNcLink" class="action-link button-secondary" href="#" download>Скачать G-code файл</a>
            <a id="downloadSvgLink" class="action-link button-secondary" href="#" download>Скачать SVG превью</a>
            <a id="downloadDxfLink" class="action-link button-secondary" href="#" download>Скачать DXF (лазер)</a>
          </div>

          <div class="details-grid">
            <div class="subpanel">
              <h3>Снимок заказа</h3>
              <div id="layoutWrap" class="layout-preview"></div>
            </div>
            <div class="subpanel">
              <h3>Состав</h3>
              <pre id="contoursSummaryPre">[]</pre>
            </div>
          </div>
          <div class="details-full-width subpanel">
            <h3>Подробности состава</h3>
            <pre id="contoursDetailsPre">[]</pre>
          </div>
        </div>
      </section>
    </div>

    <p id="status" class="status-line"></p>
  </div>

  <script src="orders.js"></script>
</body>
</html>
